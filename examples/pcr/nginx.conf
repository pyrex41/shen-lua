# examples/pcr/nginx.conf — proof-carrying tool calls over LIVE facts.
#
#     mkdir -p examples/pcr/logs
#     openresty -p "$PWD/examples/pcr" -c nginx.conf
#
# The caller carries the proof; the gate CHECKS it against the fact world
# current at this request. Two workers share one versioned fact blob
# (lua_shared_dict), so a revoke through either worker is seen by both.
#
# The authority graph: alice (human) owns crm-contacts, delegates (full) to
# orchestrator (her agent), which delegates-read (ATTENUATED) to researcher
# (the subagent it spawned).
#
#   # allowed — the researcher subagent reads the CRM; the nested proof is
#   # the whole delegation chain (researcher may read BECAUSE orchestrator
#   # attenuated-delegated BECAUSE alice delegated BECAUSE alice owns):
#   curl -i -H 'X-Subject: researcher' -H 'X-Resource: crm-contacts' \
#        -H 'X-Proof: [by-read-delegation [by-delegation [by-owner [fact owns alice crm-contacts] [fact same-tenant alice crm-contacts]] [fact delegates alice orchestrator]] [fact delegates-read orchestrator researcher]]' \
#        localhost:8093/protected/
#
#   # attenuation: the SAME proof cannot escalate to a write (POST -> write):
#   #   403 {"error":"forbidden","reason":"proof does not establish (may researcher write crm-contacts)"}
#
#   # incident: kill the agent session's authority (admin, localhost only):
#   curl -X POST localhost:8093/admin/revoke \
#        -d '{"pred":"delegates","s":"alice","r":"orchestrator"}'
#
#   # the researcher's IDENTICAL proof now fails — the whole subtree built
#   # through that edge is dead, on every worker, on the next request:
#   #   403 {"error":"forbidden","reason":"proof does not establish (may researcher read crm-contacts)"}
#   # ...while alice's own ownership proof still passes (surgical revocation):
#   curl -i -H 'X-Subject: alice' -H 'X-Resource: crm-contacts' \
#        -H 'X-Proof: [by-owner [fact owns alice crm-contacts] [fact same-tenant alice crm-contacts]]' \
#        -X POST localhost:8093/protected/
#
#   # re-grant and the researcher's original curl works again:
#   curl -X POST localhost:8093/admin/grant \
#        -d '{"pred":"delegates","s":"alice","r":"orchestrator"}'

daemon off;
worker_processes 2;                 # exercise cross-worker fact propagation
pid logs/nginx.pid;
error_log logs/error.log info;      # the proof audit lines land here
env PCR_DEBUG_HEADERS;              # opt-in: expose the inference count as a response header

events { worker_connections 256; }

http {
    access_log logs/access.log;

    lua_shared_dict pcr_facts 4m;   # the ONE versioned fact blob

    types {
        application/json json;
        text/plain       shen;
    }
    default_type application/octet-stream;

    init_by_lua_block {
        local prefix = ngx.config.prefix()
        package.path = prefix .. "../../?.lua;" .. prefix .. "?.lua;" .. package.path
    }

    # boot Shen + typed load + seed the fact blob (add-if-absent) per worker
    init_worker_by_lua_block { require("app") }

    server {
        listen 8093;

        # preview endpoint: POST {subject, action, resource, proof}
        location /api/ {
            content_by_lua_block { require("app").handle() }
        }

        # the authority endpoints: grant/revoke facts (demo: localhost only)
        location /admin/ {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            content_by_lua_block { require("app").handle() }
        }

        # the enforcement gate: the proof is checked BEFORE the tool runs
        location /protected/ {
            access_by_lua_block { require("app").gate() }
            content_by_lua_block { ngx.header.content_type = "application/json"
                                   ngx.say('{"ok":true,"tool":"crm-contacts","result":"the governed tool ran","worker":' .. ngx.worker.pid() .. '}') }
        }

        # serve the logic itself (one source of truth)
        location = /rules.shen { default_type text/plain; alias rules.shen; }
    }
}
