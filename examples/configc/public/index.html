<!DOCTYPE html>
<!--
  examples/configc/public/index.html — live typed config compiler.

  Edit the config on the left; the right shows what compile-config in
  configc.shen (shen-lua, under OpenResty, loaded under (tc +)) generates from
  it — a Kubernetes Deployment and an nginx server block — or the validation
  errors. One typed source of "valid" and "what it generates", the same on the
  CLI, here, and at a CI/admission gate.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shen-lua · typed config compiler</title>
  <style>
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 60rem; margin: 2rem auto; padding: 0 1rem; color: #1f2937; }
    h1 { font-size: 1.4rem; } code { background: #f0f0f0; padding: 0 .25em; border-radius: 3px; } a { color: #2563eb; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
    textarea { width: 100%; height: 18rem; font: 13px/1.5 ui-monospace, monospace; padding: .75rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .out { min-height: 18rem; }
    pre { background: #0f172a; color: #e2e8f0; padding: .75rem 1rem; border-radius: 6px; overflow-x: auto; font-size: 12.5px; line-height: 1.5; margin: 0 0 .75rem; }
    pre .fname { color: #93c5fd; }
    .errors { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; border-radius: 6px; padding: .75rem 1rem; }
    .errors li { margin: .15rem 0; }
    label { font-size: .8rem; color: #6b7280; }
  </style>
</head>
<body>
  <h1>Typed config compiler <small>— validate &amp; generate, in Shen</small></h1>
  <p>Edit the config; the artifacts on the right are generated by
     <a href="/configc.shen" target="_blank"><code>compile-config</code></a>.
     Break it (blank <code>service</code>, <code>port</code> 70000) and it emits
     nothing but errors — a config can't compile to a manifest unless it's valid.</p>

  <div class="cols">
    <div>
      <label>config (JSON)</label>
      <textarea id="cfg">{
  "service": "web",
  "port": 8080,
  "replicas": 3,
  "hosts": ["a.example.com", "b.example.com"]
}</textarea>
    </div>
    <div class="out" id="out"></div>
  </div>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

    async function recompile() {
      let cfg;
      try { cfg = JSON.parse($("cfg").value); }
      catch (e) { $("out").innerHTML = `<div class="errors">config is not valid JSON: ${esc(e.message)}</div>`; return; }
      let res;
      try {
        res = await (await fetch("/api/compile", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(cfg),
        })).json();
      } catch (e) { $("out").innerHTML = `<div class="errors">server unreachable</div>`; return; }
      if (res.ok) {
        $("out").innerHTML = res.files.map((f) =>
          `<pre><span class="fname"># ${esc(f.name)}</span>\n${esc(f.body)}</pre>`).join("");
      } else {
        $("out").innerHTML = `<div class="errors"><b>will not compile:</b><ul>`
          + res.errors.map((e) => `<li>${esc(e)}</li>`).join("") + `</ul></div>`;
      }
    }

    $("cfg").addEventListener("input", recompile);
    recompile();
  </script>
</body>
</html>
