# examples/openresty/nginx.conf — run the Shen guestbook app under OpenResty.
#
# Run it from the repo root with the example dir as the nginx prefix:
#
#     mkdir -p examples/openresty/logs
#     openresty -p "$PWD/examples/openresty" -c nginx.conf
#
# then open http://127.0.0.1:8080/ . The prefix is this directory, so the
# relative paths below (logs/, public/) resolve here, and init_by_lua derives
# the repo root from the prefix to put shen-lua on package.path.

daemon off;
worker_processes 1;                 # one worker = one kernel boot, simplest demo
pid logs/nginx.pid;
error_log logs/error.log info;

events { worker_connections 256; }

http {
    access_log logs/access.log;

    # The guestbook lives in a shared dict so it survives across requests
    # (and would be shared across workers if you raised worker_processes).
    lua_shared_dict guestbook 1m;

    # Put shen-lua (repo root) and this example dir on package.path. The prefix
    # is .../examples/openresty/, so ../../ is the repo root.
    init_by_lua_block {
        local prefix = ngx.config.prefix()
        package.path = prefix .. "../../?.lua;" .. prefix .. "?.lua;" .. package.path
    }

    # Boot Shen ONCE per worker (kernel load + typed load of validate.shen),
    # then wire storage to the shared dict. Never do this per request.
    init_worker_by_lua_block {
        local app  = require("app")
        local dict = ngx.shared.guestbook
        app.use_store({
            add = function(name, message)
                local n = dict:incr("count", 1, 0)
                dict:set("row:" .. n, name .. "\t" .. message)
                return n
            end,
            list = function()
                local n, rows = dict:get("count") or 0, {}
                for i = 1, n do
                    local v = dict:get("row:" .. i)
                    if v then
                        local name, msg = v:match("^(.-)\t(.*)$")
                        rows[#rows + 1] = { name, msg }
                    end
                end
                return rows
            end,
        })
    }

    server {
        listen 8080;

        # The JSON API — every request goes through (route ...) in Shen.
        location /api/ {
            content_by_lua_block { require("app").handle() }
        }

        # The front end. Today a plain HTML+fetch page; the natural next step
        # is to compile a Shen UI to JS with ShenScript and serve it here.
        location / {
            root  public;           # relative to the nginx prefix
            index index.html;
        }
    }
}
