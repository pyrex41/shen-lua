# examples/openresty-authz/nginx.conf — run the Shen authz app under OpenResty.
#
#     mkdir -p examples/openresty-authz/logs
#     openresty -p "$PWD/examples/openresty-authz" -c nginx.conf
#
# then drive the JSON API (see README.md). The prefix is this directory, so
# logs/ resolves here and init_by_lua derives the repo root for package.path.

daemon off;
worker_processes 1;                 # one worker: one kernel boot, one replay
pid logs/nginx.pid;
error_log logs/error.log info;

events { worker_connections 256; }

# --- Production durability: lua-resty-lmdb -----------------------------------
# If your OpenResty ships the resty.lmdb module (Kong's build does), uncomment
# these and set backend="lmdb" in init_worker below. The event log then lives
# in a memory-mapped, MVCC, ACID store instead of a flat file — same interface,
# same replay-on-boot, zero-copy FFI reads on the hot path.
#
# lmdb_environment_path logs/lmdb;
# lmdb_map_size         64m;

http {
    access_log logs/access.log;

    types { application/json json; text/plain txt; }
    default_type application/json;

    # Short-TTL cache in front of the networked identity lookup (see below), so
    # the common request never touches the socket at all. Shared across workers.
    lua_shared_dict auth_cache 1m;

    # Put shen-lua (repo root) and this example dir on package.path. The prefix
    # is .../examples/openresty-authz/, so ../../ is the repo root.
    init_by_lua_block {
        local prefix = ngx.config.prefix()
        package.path = prefix .. "../../?.lua;" .. prefix .. "?.lua;" .. package.path
    }

    # Boot Shen ONCE per worker (kernel + typed load of authz.shen), open the
    # durable store, replay its log, and seed a demo tenant on first boot only.
    init_worker_by_lua_block {
        local app   = require("app")
        local Store = require("store")
        local store = Store.new{
            codec   = app.json,
            backend = "file",                 -- swap to "lmdb" with the directives above
            path    = ngx.config.prefix() .. "logs/authz-log.jsonl",
        }
        if store.seq() == 0 then              -- fresh log: seed the demo world
            store.seed_token("tok-admin", "admin", true)
            store.seed_token("tok-alice", "alice", false)
            store.seed_token("tok-bob",   "bob",   false)
            store.seed_token("tok-carol", "carol", false)
            store.create("acme",   "doc-1", "acme launch plan")
            store.create("globex", "doc-2", "globex roadmap")
            store.grant("alice", "acme", "editor")
            store.grant("bob",   "acme", "viewer")
        end
        app.use_store(store)

        -- Identity resolution (token -> user), the head of the proof chain.
        -- Default: resolve against the local store (the seeded demo tokens).
        --
        -- Production: end-user tokens live in a networked session store, so
        -- resolve them over a COSOCKET — non-blocking, so the round-trip never
        -- stalls the worker — cached in the shared dict above. Uncomment to
        -- point at a Redis holding `SET auth:<token> <user>`:
        --
        -- local Auth = require("auth")
        -- app.use_auth(Auth.cosocket_resolver{
        --     redis    = { host = "127.0.0.1", port = 6379, timeout_ms = 200 },
        --     cache    = ngx.shared.auth_cache,
        --     ttl      = 5,
        --     fallback = store.token_user,   -- degrade to local if Redis is down
        -- })
    }

    server {
        listen 8080;

        # The whole JSON API goes through (route Method Path Body) in Shen.
        location /api/ {
            content_by_lua_block { require("app").handle() }
        }
    }
}
